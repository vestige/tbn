<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touban Maker</title>
</head>
<body>
  <h1>Touban Maker</h1>

  <div>
    <label for="startDate">開始日</label>
    <input id="startDate" type="date" value="2026-04-03" />
  </div>

  <div>
    <label for="memberCount">人数</label>
    <input id="memberCount" type="number" min="1" max="52" value="8" />
  </div>

  <div>
    <label for="weeks">何週間分</label>
    <input id="weeks" type="number" min="1" value="8" />
  </div>

  <button id="generateButton" disabled>当番表を作成する</button>

  <div id="loading">Ruby.wasm を読み込み中です...</div>
  <div id="error"></div>
  <div id="result"></div>

  <script type="module" src="./app.js?v=3"></script>
</body>
</html>
